name: Scrape Imobiliare to Hugging Face

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and upload directly to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          SITE_NAME: "imobiliare.ro"
          CITY_SLUG: "brasov"
          OFFER_TYPE: "sale"
          PROPERTY_TYPE: "apartments"
          START_URL: "https://www.imobiliare.ro/vanzare-apartamente/judetul-brasov/brasov"
          BATCH_SIZE: "300"
          PAGE_WORKERS: "8"
          DETAIL_WORKERS: "6"
          DETAIL_REQUEST_DELAY_SECONDS: "0.2"
          REQUEST_DELAY_SECONDS: "0.5"
        run: python -m scraper.main
