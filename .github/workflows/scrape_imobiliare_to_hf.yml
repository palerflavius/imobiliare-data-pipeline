name: Scrape imobiliare.ro to Hugging Face

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - id: targets
        name: Build target matrix
        run: |
          matrix="$(python scraper/build_matrix.py scraper/targets/imobiliare.json)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix"

  scrape:
    name: Scrape ${{ matrix.target.county_slug }} / ${{ matrix.target.city_slug }} / ${{ matrix.target.area_slug || 'all' }}
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          SCRAPER_HTTP_PROXY: ${{ secrets.SCRAPER_HTTP_PROXY }}
          BROWSER_IMPERSONATE: "chrome"
          SITE_NAME: ${{ matrix.target.site_name }}
          COUNTY_SLUG: ${{ matrix.target.county_slug }}
          CITY_SLUG: ${{ matrix.target.city_slug }}
          AREA_SLUG: ${{ matrix.target.area_slug }}
          SEARCHES_JSON: ${{ toJSON(matrix.target.searches) }}
          BATCH_SIZE: "2000"
          PAGE_WORKERS: "8"
          DETAIL_WORKERS: "8"
          DETAIL_REQUEST_DELAY_SECONDS: "0.1"
          REQUEST_DELAY_SECONDS: "0.5"
          HF_UPLOAD_OPERATION_CHUNK_SIZE: "12"
          HF_UPLOAD_CHUNK_DELAY_SECONDS: "20"
          HF_COMMIT_RETRIES: "5"
          HF_COMMIT_RETRY_FALLBACK_SECONDS: "3600"
        run: python -m scraper.run_target
